<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dhruv FreightOps</title>
  <meta name="description" content="Live dispatcher console with a voice agent that actually takes actions on the page." />
  <script>(function(){try{var t=localStorage.getItem('jarvis.theme')||'system';if(t==='system'){t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- latency-pass: preconnect to the same-origin WS endpoint so the
       TLS handshake + HTTP/1.1 upgrade socket is warm before the user
       clicks Place Call. Saves ~150-300 ms on the first dial. We also
       prefetch the nonce endpoint's DNS since it sits behind the same
       origin. -->
  <link rel="preconnect" href="/" />
  <link rel="dns-prefetch" href="/api/ws-nonce" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" />
  <link rel="modulepreload" href="/js/app.js" />
  <link rel="modulepreload" href="/js/voice-agent.js" />
  <link rel="modulepreload" href="/js/router.js" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="stylesheet" href="/css/voice-dock.css" />
  <link rel="stylesheet" href="/css/map.css" />
</head>
<body>
  <div class="app-shell">
    <main class="app-main" id="main" tabindex="-1">
      <div id="route-target" class="route-target" aria-live="polite" aria-busy="false"></div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>

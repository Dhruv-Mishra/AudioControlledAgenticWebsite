<section id="map-root" class="map-page" data-agent-id="map.root">
  <h1 class="sr-only">Freight map</h1>

  <div id="map-filter-rail" class="map-filter-rail" role="group" aria-label="Map filters" data-agent-id="map.filters.rail">
    <p class="map-filter-rail-title">Layers</p>
    <div class="map-filter-chips">
      <button class="chip-btn" type="button" data-agent-id="map.filter.loads" data-layer="loads" aria-pressed="true">Loads</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.carriers" data-layer="carriers" aria-pressed="true">Carriers</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.lanes" data-layer="lanes" aria-pressed="true">Lanes</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.delayed" data-layer="delayed" aria-pressed="false">Delayed</button>
    </div>

    <p class="map-filter-rail-title">Search</p>
    <input id="map-search" class="input" type="search" placeholder="City, load, carrier" data-agent-id="map.search" aria-label="Search loads and carriers" />

    <p class="map-filter-rail-title">Items</p>
    <ul id="map-filter-list" class="map-filter-list" aria-label="Map items"></ul>

    <div class="map-list-toggle-wrap">
      <button class="btn btn--ghost btn--sm" id="map-list-toggle" type="button" data-agent-id="map.list_toggle" aria-pressed="false">List view</button>
    </div>
  </div>

  <div id="map-canvas" class="map-canvas" role="application" tabindex="0" data-agent-id="map.canvas" aria-label="Freight map. Use arrow keys to pan, plus and minus to zoom." aria-busy="true"></div>

  <div id="map-tile-error" class="map-tile-error" role="alert" hidden>
    <span class="map-tile-error-text">Map tiles failed to load.</span>
    <button class="btn btn--sm btn--outlined" type="button" id="map-tile-retry" data-agent-id="map.tile_retry">Retry</button>
  </div>

  <aside id="map-detail" class="map-detail" data-agent-id="map.detail" hidden role="complementary" aria-label="Load detail"></aside>

  <aside id="carrier-detail-panel" class="carrier-panel" aria-hidden="true" aria-label="Carrier detail">
    <div class="carrier-panel-hero">
      <picture>
        <source type="image/webp" />
        <img width="480" height="320" loading="lazy" decoding="async" class="carrier-panel-img" alt="" />
      </picture>
      <span class="chip carrier-panel-status"></span>
      <button class="carrier-panel-close icon-btn" type="button" aria-label="Close carrier detail">&times;</button>
    </div>

    <div class="carrier-panel-body">
      <h2 class="carrier-panel-name"></h2>
      <p class="carrier-panel-ids"></p>

      <section class="carrier-panel-section">
        <h3 class="carrier-panel-section-title">Equipment</h3>
        <div class="carrier-panel-chips"></div>
      </section>

      <section class="carrier-panel-section">
        <h3 class="carrier-panel-section-title">Current Load</h3>
        <dl class="carrier-panel-kv carrier-panel-load-kv">
          <dt>ETA</dt><dd class="carrier-panel-eta">—</dd>
          <dt>Speed</dt><dd class="carrier-panel-speed">—</dd>
          <dt>Heading</dt><dd class="carrier-panel-heading">—</dd>
        </dl>
      </section>

      <section class="carrier-panel-section">
        <h3 class="carrier-panel-section-title">Driver</h3>
        <dl class="carrier-panel-kv carrier-panel-driver-kv">
          <dt>Name</dt><dd class="carrier-panel-driver-name">—</dd>
          <dt>HOS remaining</dt><dd class="carrier-panel-driver-hos">—</dd>
        </dl>
      </section>
    </div>

    <div class="carrier-panel-actions">
      <button type="button" class="btn btn--sm btn--outlined" data-action="call-driver">Call driver</button>
      <button type="button" class="btn btn--sm btn--primary" data-action="assign-load">Assign load</button>
      <button type="button" class="btn btn--sm btn--ghost" data-action="track">Track</button>
    </div>
  </aside>

  <div id="map-list-view" class="map-list-view" hidden aria-label="Map items as a list">
    <h2>Map items</h2>
    <ul id="map-list-items"></ul>
  </div>

  <div class="map-controls" aria-hidden="false">
    <button class="icon-btn" id="map-zoom-in"  aria-label="Zoom in"    type="button" data-agent-id="map.zoom_in">+</button>
    <button class="icon-btn" id="map-zoom-out" aria-label="Zoom out"   type="button" data-agent-id="map.zoom_out">&ndash;</button>
    <button class="icon-btn" id="map-reset"    aria-label="Reset view" type="button" data-agent-id="map.reset_view">&#8962;</button>
  </div>

  <div class="map-attribution" id="map-attribution"></div>
</section>

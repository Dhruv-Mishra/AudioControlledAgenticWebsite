<section id="map-root" class="map-page" data-agent-id="map.root">
  <h1 class="sr-only">Freight map</h1>
  <div id="map-filter-rail" class="map-filter-rail" role="group" aria-label="Map filters" data-agent-id="map.filters.rail">
    <p class="map-filter-rail-title">Layers</p>
    <div class="map-filter-chips">
      <button class="chip-btn" type="button" data-agent-id="map.filter.loads" data-layer="loads" aria-pressed="true">Loads</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.carriers" data-layer="carriers" aria-pressed="true">Carriers</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.lanes" data-layer="lanes" aria-pressed="true">Lanes</button>
      <button class="chip-btn" type="button" data-agent-id="map.filter.delayed" data-layer="delayed" aria-pressed="false">Delayed</button>
    </div>
    <p class="map-filter-rail-title">Search</p>
    <input id="map-search" class="input" type="search" placeholder="City, load, carrier" data-agent-id="map.search" aria-label="Search loads and carriers" />
    <p class="map-filter-rail-title">Items</p>
    <ul id="map-filter-list" class="map-filter-list" aria-label="Map items"></ul>
    <div class="map-list-toggle-wrap">
      <button class="btn btn--ghost btn--sm" id="map-list-toggle" type="button" data-agent-id="map.list_toggle" aria-pressed="false">List view</button>
    </div>
  </div>
  <div id="map-canvas" class="map-canvas" role="application" tabindex="0" data-agent-id="map.canvas" aria-label="Freight map. Use arrow keys to pan, plus and minus to zoom."></div>
  <aside id="map-detail" class="map-detail" data-agent-id="map.detail" hidden aria-label="Selected load or carrier detail" role="dialog" aria-modal="false"></aside>
  <div id="map-list-view" class="map-list-view" hidden aria-label="Map items as a list">
    <h2>Map items</h2>
    <ul id="map-list-items"></ul>
  </div>
  <div class="map-controls" aria-hidden="false">
    <button class="icon-btn" id="map-zoom-in"  aria-label="Zoom in"   type="button" data-agent-id="map.zoom_in">+</button>
    <button class="icon-btn" id="map-zoom-out" aria-label="Zoom out"  type="button" data-agent-id="map.zoom_out">&ndash;</button>
    <button class="icon-btn" id="map-reset"    aria-label="Reset view" type="button" data-agent-id="map.reset_view">&#8962;</button>
  </div>
  <div class="map-attribution" id="map-attribution"></div>
</section>

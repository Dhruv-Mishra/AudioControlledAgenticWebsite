services:
  app:
    image: ${IMAGE_REF:-${IMAGE_NAME:-dhruv-freightops:latest}}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: ${CONTAINER_PORT:-3011}
    ports:
      - ${HOST_BIND:-127.0.0.1}:${HOST_PORT:-3011}:${CONTAINER_PORT:-3011}
    restart: unless-stopped
    init: true
# /etc/nginx/sites-available/jarvis.whoisdhruv.com.conf
#
# Reverse-proxy for the Dhruv FreightOps demo (Node service on 127.0.0.1:3011).
# Drop in `sites-available/`, symlink from `sites-enabled/`, run `nginx -t`,
# `systemctl reload nginx`. Leaves any other sites on this host untouched.
#
# Cert layout assumes certbot defaults:
#   /etc/letsencrypt/live/jarvis.whoisdhruv.com/fullchain.pem
#   /etc/letsencrypt/live/jarvis.whoisdhruv.com/privkey.pem
# Run `certbot --nginx -d jarvis.whoisdhruv.com` (as the deploy script does)
# if the cert doesn't exist yet.

# ------------------ :80 — HTTP → HTTPS redirect ------------------
server {
    listen 80;
    listen [::]:80;
    server_name jarvis.whoisdhruv.com;

    # Allow the ACME HTTP-01 challenge so certbot renewals succeed.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    # Everything else → HTTPS, permanent.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------ :443 — TLS, HTTP/2 ------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name jarvis.whoisdhruv.com;

    # Cert + private key (certbot default paths).
    ssl_certificate     /etc/letsencrypt/live/jarvis.whoisdhruv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jarvis.whoisdhruv.com/privkey.pem;

    # Modern TLS. TLS 1.2 + 1.3 only; no 1.0/1.1 (deprecated by IETF and most
    # major browsers). Cipher list intentionally terse — the defaults from
    # the operating system's openssl are sufficient on recent distros.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:JarvisSSL:10m;
    ssl_session_tickets off;

    # ------------- Security headers -------------
    # HSTS 2 years + subdomains. Do NOT set `preload` unless submitted to the
    # Chrome preload list first.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Content-Security-Policy. The only third-party we talk to at runtime is
    # wss: for WebSockets (to our own origin) and generativelanguage (only
    # server-side, so not listed here). If you add fonts or analytics later,
    # extend the source list here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss:; media-src 'self'; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # ------------- Request limits + logging -------------
    client_max_body_size 16m;
    client_body_timeout 60s;

    access_log /var/log/nginx/jarvis.access.log;
    error_log  /var/log/nginx/jarvis.error.log;

    # ------------- Compression safety net -------------
    # Node's compression middleware handles most text/JS/CSS; nginx gzip picks
    # up anything that bypasses Node (e.g. HTTP/2 server push artefacts).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ------------- WebSocket endpoint -------------
    # /api/live is the Gemini Live bridge. Needs the Upgrade + Connection
    # headers to switch protocols, a long read timeout (so mid-call silence
    # doesn't look like a dead socket), and buffering off so PCM frames flow
    # in real time.
    location = /api/live {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WS; don't kill during a call.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_request_buffering off;
    }

    # ------------- HTTP (REST + static) -------------
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
